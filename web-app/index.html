<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gmail Creator</title>
    <style>
        :root {
            --tg-theme-bg: #ffffff;
            --tg-theme-text: #000000;
            --tg-theme-hint: #999999;
            --tg-theme-link: #2481cc;
            --tg-theme-button: #2481cc;
            --tg-theme-button-text: #ffffff;
            --tg-theme-secondary-bg: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4285F4, #34A853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--tg-theme-hint);
            margin-top: 8px;
            font-size: 14px;
        }

        .card {
            position: relative;
            background: var(--tg-theme-secondary-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card .icon {
            font-size: 36px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            flex-shrink: 0;
        }

        .card .content h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card .content p {
            font-size: 13px;
            color: var(--tg-theme-hint);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint);
        }

        body.dark {
            --tg-theme-bg: #1a1a1a;
            --tg-theme-text: #ffffff;
            --tg-theme-hint: #aaaaaa;
            --tg-theme-secondary-bg: #2c2c2c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gmail Creator</h1>
            <p>Choose an option to get started</p>
        </div>

        <div class="card" onclick="sendAction('email_create')">
            <div class="icon">📧</div>
            <div class="content">
                <h2>Email Create</h2>
                <p>Create your custom Gmail address</p>
            </div>
        </div>

        <div class="card" onclick="sendAction('wallet')">
            <div class="icon">💰</div>
            <div class="content">
                <h2>Wallet</h2>
                <p>Check balance & deposit funds</p>
            </div>
        </div>

        <div class="card" onclick="sendAction('admin_contact')">
            <div class="icon">📞</div>
            <div class="content">
                <h2>Admin Contact</h2>
                <p>Get help from @Xricx0</p>
            </div>
        </div>

        <div class="card" onclick="sendAction('login')">
            <div class="icon">🔐</div>
            <div class="content">
                <h2>Login</h2>
                <p>Sign in to your account</p>
            </div>
        </div>

        <div class="footer">
            Powered by Telegram Web App
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function applyTheme() {
            const style = document.documentElement.style;
            style.setProperty('--tg-theme-bg', tg.backgroundColor || '#ffffff');
            style.setProperty('--tg-theme-text', tg.textColor || '#000000');
            style.setProperty('--tg-theme-hint', tg.hintColor || '#999999');
            style.setProperty('--tg-theme-link', tg.linkColor || '#2481cc');
            style.setProperty('--tg-theme-button', tg.buttonColor || '#2481cc');
            style.setProperty('--tg-theme-button-text', tg.buttonTextColor || '#ffffff');
            style.setProperty('--tg-theme-secondary-bg', tg.secondaryBackgroundColor || '#f0f0f0');
            if (tg.colorScheme === 'dark') {
                document.body.classList.add('dark');
            }
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);

        function sendAction(action) {
            tg.sendData(action);
            tg.close();
        }

        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            tg.close();
        });
    </script>
</body>
</html>
