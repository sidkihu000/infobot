[phases.setup]
aptPkgs = [
    # Build tools for Python C extensions
    "build-essential",
    "python3-dev",

    # Playwright/Chromium runtime libraries
    "libnss3",
    "libnspr4",
    "libdbus-1-3",
    "libatk-1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxfixes3",
    "libxrandr2",
    "libgbm1",
    "libpango-1.0-0",
    "libcairo2",
    "libasound2",
    "libatspi2.0-0"
]

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium"
]
